# YourSign API. Cloudflare Worker. ADR-0008 (AI Gateway).
name = "yoursign-api"
main = "src/index.ts"
account_id = "450e01c6b878357ff7bccd2d4b23123e"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
SOLANA_CLUSTER = "devnet"
SOLANA_RPC_URL = "https://api.devnet.solana.com"
PROGRAM_ID = "35RbwNgx9Em28mMLZ6iWzjCnaTd4tD2NWuxrHqR76M8X"
SIWS_DOMAIN = "yoursign.tech"
SIWS_AUDIENCE = "https://yoursign.tech"
AI_GATEWAY_BASE = "https://gateway.ai.cloudflare.com/v1"
SCOPE_R2_BUCKET = "yoursign-agent-scopes"

# Required wrangler secrets:
#   - SIWS_JWT_SECRET — HMAC for session cookies (32 random bytes, base64).
#   - AI_GATEWAY_TOKEN
#   - ANTHROPIC_API_KEY

[[r2_buckets]]
binding = "SCOPES"
bucket_name = "yoursign-agent-scopes"

[[kv_namespaces]]
binding = "SIWS_NONCES"
id = "85b5514e64c044ee9df5667167d82f9d"

# Hyperdrive added when Postgres is provisioned (Neon Marketplace).
# [[hyperdrive]]
# binding = "DB"
# id = "REPLACE_WITH_HYPERDRIVE_ID"

[ai]
binding = "AI"

[env.production]
name = "yoursign-api-prod"
[env.production.vars]
SOLANA_CLUSTER = "mainnet-beta"
SOLANA_RPC_URL = "https://api.mainnet-beta.solana.com"
PROGRAM_ID = "REPLACE_WITH_MAINNET_PROGRAM_ID"
SIWS_DOMAIN = "yoursign.tech"
SIWS_AUDIENCE = "https://yoursign.tech"
SCOPE_R2_BUCKET = "yoursign-agent-scopes-prod"
